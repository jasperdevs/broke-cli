<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Fun Zone! 🎉</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff; /* Light blue background */
            color: #333;
            text-align: center;
            padding: 50px;
            background-image: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #ff6b6b; /* Fun red color */
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #ccc;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .button-candy {
            display: inline-block;
            padding: 15px 30px;
            background-color: #4ecdc4; /* Teal button */
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1em;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
            cursor: pointer;
        }
        .button-candy:hover {
            background-color: #3a9b91;
            transform: scale(1.05);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        .emoji {
            font-size: 2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Welcome to the Fun Zone! ✨</h1>
        <p>Get ready for an explosion of awesome! This page is designed to make you smile.</p>
        
        <a href="#" class="button-candy">Click Here for More Fun!</a>
        
        <div class="emoji">🦄🍭🎈</div>
        <p style="margin-top: 30px; color: #888;">(P.S. You can customize this with your own amazing content!)</p>
    </div>
</body>
</html>
