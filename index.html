<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funky Fun Index!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff; /* Light blue background */
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #ffffff;
            border: 5px dashed #ff69b4; /* Pink dashed border */
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 10px 10px 0px #a0a0a0;
        }
        h1 {
            color: #ff4500; /* Orange-Red */
            font-size: 3em;
            text-shadow: 2px 2px #ffa07a;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        button {
            background-color: #32cd32; /* Lime Green */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 10px;
            transition: background-color 0.2s;
            box-shadow: 3px 3px #228b22;
        }
        button:hover {
            background-color: #228b22;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome to the Fun Zone! 🎉</h1>
        <p>Get ready for some digital delight!</p>
        
        <button onclick="alert('Yay! You clicked something fun!')">Click Me!</button>

        <p>This page is coded with maximum fun vibes!</p>
        <p>Keep smiling! 😄</p>
    </div>
</body>
</html>
