<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Page!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f8ff; /* Light sky blue background */
            color: #333;
            text-align: center;
        }
        .container {
            background: #ffffff;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #ff6347; /* Tomato red */
            font-size: 3em;
            margin-bottom: 15px;
        }
        p {
            color: #555;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        button {
            background-color: #4caf50; /* Green */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s;
        }
        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        #counter-display {
            margin-top: 20px;
            font-size: 3em;
            color: #ff8c00; /* Dark orange */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome to Fun Page! 🎉</h1>
        <p>Click the button below to count something silly.</p>
        
        <button id="funButton">Click Me!</button>
        
        <div id="counter-display">0</div>
    </div>

    <script>
        let count = 0;
        const button = document.getElementById('funButton');
        const display = document.getElementById('counter-display');

        button.addEventListener('click', () => {
            count++;
            display.textContent = count;
        });
    </script>
</body>
</html>
